name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.BASE_URL }}" ] || [ -z "${{ secrets.API_USERNAME }}" ] || [ -z "${{ secrets.API_PASSWORD }}" ]; then
            echo "ERROR: Required secrets are not configured (BASE_URL, API_USERNAME, API_PASSWORD)"
            exit 1
          fi

      - name: Create environment file
        run: |
          cat > restful-booker.postman_environment.json << 'EOF'
          {
            "id": "restful-booker-env",
            "name": "Restful-Booker",
            "values": [
              { "key": "base_url", "value": "${{ secrets.BASE_URL }}", "type": "default", "enabled": true },
              { "key": "username", "value": "${{ secrets.API_USERNAME }}", "type": "default", "enabled": true },
              { "key": "password", "value": "${{ secrets.API_PASSWORD }}", "type": "secret", "enabled": true },
              { "key": "token", "value": "", "type": "default", "enabled": true }
            ],
            "_postman_variable_scope": "environment"
          }
          EOF

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run API tests
        run: npm run test:ci

      - name: Push report to QA Hub
        if: always()
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
          HUB_REPO: Defused15/test-hub
          PROJECT_NAME: Restful-Booker
          REPORT_PATH: ./reports/newman-report.json
        run: |
          node -e "
            const fs    = require('fs');
            const https = require('https');

            const reportPath = process.env.REPORT_PATH;
            if (!fs.existsSync(reportPath)) {
              console.log('⚠️  newman-report.json not found, skipping hub upload');
              process.exit(0);
            }

            const content  = fs.readFileSync(reportPath).toString('base64');
            const token    = process.env.HUB_TOKEN;
            const repo     = process.env.HUB_REPO;
            const project  = process.env.PROJECT_NAME;
            const apiPath  = '/repos/' + repo + '/contents/projects/' + project + '/latest.json';

            const headers = {
              'Authorization': 'Bearer ' + token,
              'Accept':        'application/vnd.github+json',
              'User-Agent':    'qa-hub',
              'Content-Type':  'application/json'
            };

            const getReq = https.request(
              { hostname: 'api.github.com', path: apiPath, method: 'GET', headers },
              res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  let sha = '';
                  try { sha = JSON.parse(data).sha || ''; } catch {}

                  const body = JSON.stringify({
                    message: 'chore: update ' + project + ' report',
                    content,
                    ...(sha ? { sha } : {})
                  });

                  const putReq = https.request(
                    {
                      hostname: 'api.github.com',
                      path: apiPath,
                      method: 'PUT',
                      headers: { ...headers, 'Content-Length': Buffer.byteLength(body) }
                    },
                    r => {
                      let out = '';
                      r.on('data', c => out += c);
                      r.on('end', () => {
                        if (r.statusCode === 200 || r.statusCode === 201) {
                          console.log('✅  Report pushed to hub (HTTP ' + r.statusCode + ')');
                        } else {
                          console.error('❌  Hub upload failed (HTTP ' + r.statusCode + ')');
                          console.error(out);
                          process.exit(1);
                        }
                      });
                    }
                  );
                  putReq.write(body);
                  putReq.end();
                });
              }
            );
            getReq.end();
          "

        - name: Trigger Test Hub Rebuild
          if: always()
          env:
            HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
            HUB_REPO: Defused15/test-hub
            PROJECT_NAME: Restful-Booker
          run: |
            echo "🚀 Triggering build in $HUB_REPO..."
            GH_TOKEN=$HUB_TOKEN gh api repos/$HUB_REPO/dispatches \
              --method POST \
              -f event_type="test-hub-trigger" \
              -f client_payload[project]=$PROJECT_NAME

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit-report.xml
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Newman Test Results
          path: reports/junit-report.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
