name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Create environment file
        run: |
          cat > restful-booker.postman_environment.json << 'EOF'
          {
            "id": "restful-booker-env",
            "name": "Restful-Booker",
            "values": [
              { "key": "base_url", "value": "${{ secrets.BASE_URL }}", "type": "default", "enabled": true },
              { "key": "username", "value": "${{ secrets.API_USERNAME }}", "type": "default", "enabled": true },
              { "key": "password", "value": "${{ secrets.API_PASSWORD }}", "type": "secret", "enabled": true },
              { "key": "token", "value": "", "type": "default", "enabled": true }
            ],
            "_postman_variable_scope": "environment"
          }
          EOF

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run API tests
        run: npm run test:ci

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit-report.xml
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Newman Test Results
          path: reports/junit-report.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
