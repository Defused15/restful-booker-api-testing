$kind: http-request
url: "{{base_url}}/booking/{{edge_booking_id_2}}"
method: DELETE
headers:
  Content-Type: application/json
  Cookie: token={{token}}
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Edge booking 2 deleted", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response time < 800ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(800);
      });
    language: text/javascript
order: 6000
