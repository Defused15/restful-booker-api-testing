$kind: http-request
url: "{{base_url}}/booking/{{booking_id}}"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
  Cookie: token={{token}}
body:
  type: text
  content: "{\r

    \    \"firstname\": \"Logan\",\r

    \    \"lastname\": \"Sand\"\r

    }"
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
scripts:
  - type: afterResponse
    code: >-
      let json = pm.response.json();

      let req = JSON.parse(pm.request.body.raw);


      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.collectionVariables.set("firstname", req.firstname);

      pm.collectionVariables.set("lastname", req.lastname);


      pm.test("Patched fields were updated", function () {
          pm.expect(json.firstname).to.eql(pm.collectionVariables.get("firstname"));
          pm.expect(json.lastname).to.eql(pm.collectionVariables.get("lastname"));
      });


      pm.test("Unpatched fields remain unchanged", function () {
          pm.expect(json.totalprice).to.eql(Number(pm.collectionVariables.get("totalprice")));
          pm.expect(json.depositpaid).to.eql(
              pm.collectionVariables.get("depositpaid") === "true" ||
              pm.collectionVariables.get("depositpaid") === true
          );
          pm.expect(json.bookingdates.checkin).to.eql(pm.collectionVariables.get("checkin"));
          pm.expect(json.bookingdates.checkout).to.eql(pm.collectionVariables.get("checkout"));
      });


      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response time < 800ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(800);
      });
    language: text/javascript
order: 6000
