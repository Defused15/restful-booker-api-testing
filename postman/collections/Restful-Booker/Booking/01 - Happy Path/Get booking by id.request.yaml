$kind: http-request
url: "{{base_url}}/booking/{{booking_id}}"
method: GET
scripts:
  - type: afterResponse
    code: >-
      let json = pm.response.json();


      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Schema is valid", function () {
          const schema = {
              type: "object",
              required: ["firstname", "lastname", "totalprice", "depositpaid", "bookingdates"],
              properties: {
                  firstname:    { type: "string" },
                  lastname:     { type: "string" },
                  totalprice:   { type: "number" },
                  depositpaid:  { type: "boolean" },
                  bookingdates: {
                      type: "object",
                      required: ["checkin", "checkout"],
                      properties: {
                          checkin:  { type: "string" },
                          checkout: { type: "string" }
                      }
                  }
              }
          };
          const Ajv = require('ajv');
          const ajv = new Ajv();
          const valid = ajv.validate(schema, json);
          pm.expect(valid, ajv.errorsText()).to.be.true;
      });


      pm.test("Booking data matches setup values", function () {
          pm.expect(json.firstname).to.eql(pm.collectionVariables.get("firstname"));
          pm.expect(json.lastname).to.eql(pm.collectionVariables.get("lastname"));
          pm.expect(json.totalprice).to.eql(Number(pm.collectionVariables.get("totalprice")));
      });


      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response time < 500ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });
    language: text/javascript
order: 2000
