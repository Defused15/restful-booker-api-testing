$kind: http-request
url: "{{base_url}}/auth"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
     
    }
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();

      pm.test("Status 200", () => {
          pm.response.to.have.status(200);
      });

      pm.test("Token does not exist", () => {
          pm.expect(json).to.not.have.property("token");
      });

      pm.test("Error message is Bad credentials", () => {
          pm.expect(json.reason).to.eql("Bad credentials");
      });

      pm.test("Response time < 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });
    language: text/javascript
order: 3000
